<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>3D animated cards | Stellar background + images</title>
  <!-- Font Awesome 6 for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <!-- Starfield canvas background -->
  <div class="starfield-bg"></div>
  <canvas id="starCanvas"></canvas>

  <section class="header-3d-section">
    <div class="tagline">
      <i class="fas fa-cube"></i> COSMIC DESIGN STUDIO
    </div>
    <h1 class="main-heading">
      Explore <span>infinite creativity</span>
    </h1>

    <div class="carousel-3d-wrap">
      <div class="card-3d-container" id="card3DContainer">
        <!-- Cards injected by JavaScript -->
      </div>
    </div>

    <div class="hint">
      <i class="fas fa-sync-alt fa-spin"></i> drag to rotate · stellar animation
    </div>
  </section>

 <script src="assets/script.js"></script>
</body>
</html>
